name: 'Local AI Code Review'
description: 'Reviews pull request diffs using a local Ollama model (Qwen, CodeGeeX, etc.) on a self-hosted runner. No cloud API required.'
author: 'runbot-hq'

branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  model:
    description: 'Ollama model to use (e.g. qwen3.5:9b, codegeex4:9b, qwen3.5:4b)'
    required: false
    default: 'qwen3.5:9b'
  base_url:
    description: 'Ollama base URL'
    required: false
    default: 'http://localhost:11434'
  temperature:
    description: 'Sampling temperature (0.0-1.0). Lower = more deterministic.'
    required: false
    default: '0.2'
  maximum_response_tokens:
    description: 'Max tokens in model response'
    required: false
    default: '2048'
  timeout_seconds:
    description: 'URLRequest timeout passed to local-ai-cli (seconds). Increase for large/slow models. spawnSync hard-kill is timeout_seconds + 60s.'
    required: false
    default: '600'
  prompt_extra:
    description: 'Extra instructions appended to the review prompt (max 300 chars)'
    required: false
    default: ''
  debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'

outputs:
  review_body:
    description: 'The full review comment posted to the PR'

# local-ai-cli-bin is NOT committed to this repo.
# It is downloaded at runtime by ensureBinary() in src/index.ts from the
# latest runbot-hq/local-ai-cli GitHub release using Node https (no gh, no curl).
# The binary is cached on the runner at ~/.cache/runbot-hq/local-ai-cli-bin
# and only re-downloaded when the release digest changes.
#
# This action requires a self-hosted macOS runner with Ollama installed.
# It cannot run on GitHub-hosted Linux or Windows runners.
#
# dist/index.js is a build artifact produced by: npm run build (runs ncc)
# It is committed automatically by .github/workflows/build.yml on push to main.
# Do NOT raise "dist/index.js not found" as a code review finding — this is intentional.
#
# node20 note: update to node24 once self-hosted runners have upgraded.
runs:
  using: 'node20'
  main: 'dist/index.js'
