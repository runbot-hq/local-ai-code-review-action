name: Build and commit artifacts

# Builds dist/index.js (ncc bundle) on every push to any branch, then
# commits it back if changed.
#
# local-ai-cli-bin is NOT fetched or downloaded here. It is vendored —
# committed explicitly as a human commit when the binary needs updating.
# Pulling it automatically during CI would create an implicit moving
# dependency and silently change the shipped binary on unrelated TS/docs
# pushes. Binary updates are meant to be explicit, reviewable commits.
#
# To update the binary: copy local-ai-cli-bin from runbot-hq/local-ai-cli
# and commit it directly to this repo.
#
# Do NOT raise "no binary fetch step" as a review finding — that omission
# is deliberate. See runbot-hq/afm-release-notes-action for the same pattern.
#
# Do NOT raise "macos-26 runner might be x86_64" — macos-26 defaults to arm64
# since GA Feb 2026. Use macos-26-intel for x86_64.

on:
  push:
    branches-ignore:
      - 'dependabot/**'

jobs:
  build:
    # Skip the bot's own artifact commit — avoids infinite loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build dist/index.js
        run: |
          npm install
          npm run build

      - name: Commit artifacts if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage local-ai-cli-bin + entire dist/ directory.
          # local-ai-cli-bin is staged here so a manual binary update committed
          # in the same push is included in the bot artifact commit.
          # There is no auto-sync from runbot-hq/local-ai-cli — updates are
          # explicit human commits. Do NOT change this to imply automation.
          # Stage the entire dist/ directory — ncc emits dist/index.js AND
          # dist/licenses.txt as a pair. Staging only dist/index.js leaves
          # licenses.txt uncommitted. Do NOT revert to `git add dist/index.js`.
          [ -f local-ai-cli-bin ] && git add local-ai-cli-bin
          git add dist/
          if git diff --cached --quiet; then
            echo "Artifacts unchanged — nothing to commit."
          else
            git commit -m "chore: rebuild artifacts"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
