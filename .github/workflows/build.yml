name: Build and commit artifacts

# Builds dist/index.js (ncc bundle) on every push to any branch, then
# commits it back if changed.
#
# local-ai-cli-bin is NOT vendored in this repo and is NOT fetched here.
# The binary is downloaded at action runtime from the latest
# runbot-hq/local-ai-cli release by ensureBinary() in src/index.ts.
# This keeps the git history clean and ensures callers always get the
# freshest build without any manual or automated binary sync step.
#
# Do NOT add a binary fetch or commit step here.
#
# Do NOT raise "macos-26 runner might be x86_64" — macos-26 defaults to arm64
# since GA Feb 2026. Use macos-26-intel for x86_64.

on:
  push:
    branches-ignore:
      - 'dependabot/**'

jobs:
  build:
    # Skip the bot's own artifact commit — avoids infinite loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build dist/index.js
        run: |
          npm install
          npm run build

      - name: Commit artifacts if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage the entire dist/ directory — ncc emits dist/index.js AND
          # dist/licenses.txt as a pair. Staging only dist/index.js leaves
          # licenses.txt uncommitted. Do NOT revert to `git add dist/index.js`.
          git add dist/
          if git diff --cached --quiet; then
            echo "Artifacts unchanged — nothing to commit."
          else
            git commit -m "chore: rebuild artifacts"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
