name: Build

# Compiles src/index.ts into dist/index.js and commits it back to main.
# Downloads local-ai-cli-bin from the latest local-ai-cli release so the
# committed binary is always in sync with the CLI repo.
#
# Runs on macos-26 (GitHub-hosted, arm64) — same as local-ai-cli's build.
# Do NOT change to self-hosted: the repo CI must run in the cloud.
# The self-hosted runner is only used by consumers of this action.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
  workflow_dispatch:

jobs:
  build:
    name: Build dist
    # Skip the bot's own artifact commit — avoids infinite loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Download local-ai-cli-bin from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo runbot-hq/local-ai-cli --pattern local-ai-cli-bin --output local-ai-cli-bin
          if [ ! -f local-ai-cli-bin ]; then
            echo "ERROR: local-ai-cli-bin download failed — cannot commit stale binary."
            exit 1
          fi
          chmod +x local-ai-cli-bin
          echo "Downloaded $(du -sh local-ai-cli-bin | cut -f1) binary from runbot-hq/local-ai-cli latest release"

      - name: Commit dist and binary
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ local-ai-cli-bin
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update dist and binary"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
