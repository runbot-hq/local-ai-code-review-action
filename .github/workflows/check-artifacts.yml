# Sanity check that fires after build.yml completes on main.
# Using workflow_run instead of push avoids the race condition where
# check-artifacts runs on the merge commit before the bot has had a chance
# to build and commit local-ai-cli-bin and dist/index.js.
#
# If build.yml is working correctly this check will always be green.
name: Check committed artifacts

on:
  workflow_run:
    workflows: ["Build and commit artifacts"]
    types: [completed]
    branches: [main]

jobs:
  check-artifacts:
    # Only run if the build workflow succeeded.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify local-ai-cli-bin and dist/index.js are committed
        run: |
          missing=()
          [ -f local-ai-cli-bin ]   || missing+=("local-ai-cli-bin binary (missing — copy from runbot-hq/local-ai-cli and commit)")
          [ -x local-ai-cli-bin ]   || missing+=("local-ai-cli-bin missing executable bit (run: chmod 755 local-ai-cli-bin && git add local-ai-cli-bin)")
          [ -f dist/index.js ]      || missing+=("dist/index.js")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing committed artifacts: ${missing[*]}"
            exit 1
          fi
          echo "All required artifacts present and executable."
